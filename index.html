<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Roboto:wght@400..500&display=swap"
      rel="stylesheet"
    />

    <title>Login | Camp-in</title>
  </head>

  <body class="body-grid">
    <header>
      <a href="#"><img src="images/logo.svg" alt="Camp-in" /> </a>
    </header>
    <main class="login-container">
      <form action="" method="post">
        <fieldset>
          <legend>Login</legend>
          <p>Insert your information below.</p>

          <label for="userEmail" class="login-field">
            E-mail
            <div class="input-container email-container">
              <input
                type="email"
                name="email"
                id="userEmail"
                placeholder="Type your email"
                required
                autocomplete="email"
              />
            </div>
          </label>

          <label for="userPassword" class="login-field">
            Password
            <div class="input-container password-container">
              <input
                type="password"
                name="password"
                id="userPassword"
                minlength="8"
                placeholder="Type your password"
                required
                autocomplete="current-password"
              />
              <span class="eye-icon-wrapper">
                <img
                  src="images/eye.svg"
                  alt="Toggle password visibility"
                  id="eyeIcon"
                  class="eye-icon"
                />
              </span>
            </div>
          </label>

          <div class="login-help">
            <label for="remenberMe" class="login-remember">
              <input type="checkbox" name="remember-me" id="remenberMe" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot my password</a>
          </div>

          <button type="submit" class="login-btn">Login</button>

          <div class="login-signup-link">
            <p>Don't have an account? <a href="#">Sign up</a>!</p>
          </div>
        </fieldset>
      </form>
    </main>
    <div class="grid-side"></div>

    <script src="script.js"></script>
  </body>
</html>
